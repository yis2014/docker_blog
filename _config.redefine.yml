# 颜色 >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> start
# 文档: https://redefine-docs.ohevan.com/basic/colors
colors:
  # 主要颜色
  primary: "#A31F34"
  # 次要颜色 (待定)
  secondary:
  # 默认主题模式初始值 (将被 prefer-color-scheme 覆盖)
  default_mode: light # light, dark
# 颜色 <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<< end


# 网站自定义 >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> start
# 文档: https://redefine-docs.ohevan.com/basic/global
global:
  # 自定义全局字体
  fonts:
    # 中文字体
    chinese: 
      enable: true # 是否启用自定义中文字体
      family: Noto Sans SC # 字体族
      url: https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap # 字体CSS文件URL
    # 英文字体
    english: 
      enable: false # 是否启用自定义英文字体
      family:  # 字体族
      url:  # 字体CSS文件URL
    # 自定义标题字体 (导航栏, 侧边栏)
    title:
      enable: false # 是否启用自定义标题字体
      family:  # 字体族
      url:  # 字体CSS文件URL
  # 内容最大宽度
  content_max_width: 1000px
  # 侧边栏宽度
  sidebar_width: 210px
  # 鼠标悬停效果
  hover:
    shadow: true # 阴影效果
    scale: false # 缩放效果
  # 滚动进度
  scroll_progress:
    bar: false # 进度条
    percentage: true # 百分比
  # 网站计数器
  website_counter:
    url: https://cn.vercount.one/js # 计数器API URL (无需更改)
    enable: true # 是否启用网站计数器
    site_pv: true # 网站页面浏览量
    site_uv: true # 网站独立访客数
    post_pv: true # 文章页面浏览量
  # 是否启用单页体验 (使用swup). 查看 https://swup.js.org/. 类似于pjax
  single_page: true
  # 是否启用预加载器
  preloader:
    enable: true
    custom_message: 一如初见，炸弹猫的赛博空间
  # 侧边工具设置
  side_tools:
    # 是否启用设置按钮的齿轮旋转动画
    gear_rotation: true
    # 是否在页面加载时自动展开工具列表
    auto_expand: false
  # 是否启用开放图谱
  open_graph:
    enable: true
    image: /images/redefine-og.webp  # 默认og:image
    description: Hexo主题Redefine, 重新定义你的Hexo之旅.
  # Google Analytics
  google_analytics:
    enable: false # 是否启用Google Analytics
    id:  # Google Analytics测量ID
# 网站自定义 <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<< end
    

# FONTAWESOME >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> start
# 文档: https://redefine-docs.ohevan.com/basic/fontawesome
fontawesome: # Pro v6.2.1
  # Thin版本
  thin: false
  # Light版本
  light: false
  # Duotone版本
  duotone: false
  # Sharp Solid版本
  sharp_solid: false
# FONTAWESOME <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<< end


# 首页横幅 >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> start
# 文档: https://redefine-docs.ohevan.com/home/home_banner
home_banner:
  # 是否启用首页横幅
  enable: true
  # 首页横幅样式
  style: fixed # static 或 fixed
  # 首页横幅图片
  image: 
    light: /images/wallhaven-wqery6-light.webp # 浅色模式
    dark: /images/wallhaven-wqery6-dark.webp # 深色模式
  # 首页横幅标题
  title: 🌙炸弹猫的赛博空间🍪
  # 首页横幅副标题
  subtitle:
    text: [一如初见!] # 副标题文本, 数组
    hitokoto:  # 一言配置
      enable: true # 是否启用一言
      show_author: false # 是否显示作者
      api: https://v1.hitokoto.cn # API URL, 可添加类型, 查看 https://developer.hitokoto.cn/sentence/#%E5%8F%A5%E5%AD%90%E7%B1%BB%E5%9E%8B-%E5%8F%82%E6%95%B0
    typing_speed: 100 # 打字速度 (毫秒)
    backing_speed: 80 # 回退速度 (毫秒)
    starting_delay: 500 # 开始延迟 (毫秒)
    backing_delay: 1500 # 回退延迟 (毫秒)
    loop: true # 是否循环
    smart_backspace: true # 是否智能回退
  # 首页横幅文本颜色
  text_color: 
    light: "#fff" # 浅色模式
    dark: "#d1d1b6" # 深色模式
  # 文本的特定样式
  text_style: 
    # 标题字体大小
    title_size: 2.8rem
    # 副标题字体大小
    subtitle_size: 1.5rem
    # 标题和副标题之间的行高
    line_height: 1.2
  # 首页横幅自定义字体
  custom_font: 
    # 是否启用自定义字体
    enable: false
    # 字体族
    family: 
    # 字体CSS文件URL
    url:
  # 首页横幅社交链接
  social_links:
    # 是否启用
    enable: true
    # 社交链接样式
    style: default # default, reverse, center
    # 社交链接
    links:
      github: https://github.com/yis2014 # 你的GitHub URL
      instagram: # 你的Instagram URL
      zhihu:  # 你的知乎URL
      twitter:  # 你的推特URL
      email:  1625692792@qq.com # 你的邮箱
      # ...... # 你可以添加更多
    # 带二维码抽屉的社交链接
    qrs:
      # weixin:  https://bombcat.oss-cn-beijing.aliyuncs.com/wechat.jpg # 你的微信二维码图片URL
      tiktok: https://bombcat.oss-cn-beijing.aliyuncs.com/picture/douyin.jpg # 你的抖音二维码图片URL
# 首页横幅 <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<< end


