#      - name: # 音频名称
#        artist: # 音频艺术家
#        url: # 音频URL
#        cover: # 音频封面URL
#        lrc: # 音频歌词
      # .... 你可以在这里添加更多音频
  # Mermaid JS. 需要hexo-filter-mermaid-diagrams (npm i hexo-filter-mermaid-diagrams). 查看 https://mermaid.js.org/
  mermaid:
    enable: false # 是否启用mermaid
    version: "11.4.1" # 默认v11.4.1
# 插件 <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<< end


# 页面模板 >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> start
# 文档: https://redefine-docs.ohevan.com/page_templates
page_templates:
  # 友链页面列数
  friends_column: 2
  # 标签页面样式
  tags_style: blur # blur, cloud
# 页面模板 <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<< end


# CDN >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> start
# 文档: https://redefine-docs.ohevan.com/cdn
cdn:
  # 是否启用CDN
  enable: true
  # CDN提供商
  provider: aliyun # npmmirror, zstatic, cdnjs, jsdelivr, unpkg, custom
  # 自定义CDN URL
  # 格式示例: https://cdn.custom.com/hexo-theme-redefine/${version}/source/${path}
  # ${path} 必须指向主题的"source"文件夹根目录
  custom_url: 
# CDN <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<< end

# 开发者模式 >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> start
# 文档: https://redefine-docs.ohevan.com/developer
developer:
  # 是否启用开发者模式 (仅适用于想要修改主题源代码的开发者，不适用于普通用户)
  enable: false
# 开发者模式 <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<< end
