# 图片配置 >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> start
# 文档: https://redefine-docs.ohevan.com/basic/defaults
defaults:
  # 网站图标
  favicon: https://bombcat.oss-cn-beijing.aliyuncs.com/picture/logo.ico
  # 网站Logo
  logo: https://bombcat.oss-cn-beijing.aliyuncs.com/picture/logo.jpg
