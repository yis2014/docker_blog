# 工作流名称（自定义，显示在 GitHub Actions 页面）
name: Auto Deploy Hexo Blog to JDCloud

# 触发条件：只有 push 到 main 分支时才执行
on:
  push:
    branches: [ main ]
  # 可选：允许手动触发（方便测试）
  workflow_dispatch:

# 定义要执行的任务
jobs:
  deploy:
    # 运行环境：GitHub 提供的 Ubuntu 虚拟机
    runs-on: ubuntu-latest
    steps:
      # 步骤 1：拉取仓库最新代码
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整的 git 历史，避免 Hexo 构建报错

      # 步骤 2：加载 SSH 私钥（连接服务器用）
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 步骤 3：核心操作——SSH 连接服务器，执行部署命令
      - name: Deploy to JDCloud Server
        run: |
          # 连接服务器，跳过主机密钥验证（关键）
          ssh -o StrictHostKeyChecking=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              -p ${{ secrets.SERVER_PORT }} << 'EOF'
              # 进入服务器上的项目目录（你的宝塔路径）
              cd /www/wwwroot/docker_blog
              # 拉取最新代码（确保是最新版本）
              git pull origin main
              # 停止旧容器（避免端口占用）
              docker compose down
              # 重建并后台启动容器（核心部署命令）
              docker compose up -d --build
              # 验证容器状态（可选，方便排查）
              echo "容器运行状态："
              docker compose ps
          EOF