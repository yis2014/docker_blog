# Hexo 配置文件
## 文档: https://hexo.io/docs/configuration.html
## 源码: https://github.com/hexojs/hexo/

# 网站信息
title: BomberCat's Cyber Space       # 网站标题
subtitle: 'for you'                  # 网站副标题
description: 'BomberCat 个人技术博客，分享生活与美好'                      # 网站描述，用于SEO
keywords:  Web开发,服务器运维,个人纪录，爱好分享                           # 网站关键词，用于SEO
author: BombCat                      # 作者姓名
language: zh-CN                      # 网站语言
timezone: ''                         # 网站时区（留空则使用本地时区）

# URL 设置
## 设置你的网站URL。例如，使用GitHub Pages时可设为 'https://用户名.github.io/项目名'
url: http://bombcat.cc              # 网站根URL
permalink: :year/:month/:day/:title/ # 文章永久链接格式
permalink_defaults:                  # 永久链接默认值（可为空）
pretty_urls:
  trailing_index: true               # 设为 false 可移除链接末尾的 'index.html'
  trailing_html: true                # 设为 false 可移除链接末尾的 '.html'

# 目录设置
source_dir: source                   # 源文件目录（存放文章、页面等）
public_dir: public                   # 生成的静态文件输出目录
tag_dir: tags                        # 标签页存放目录
archive_dir: archives                # 归档页存放目录
category_dir: categories             # 分类页存放目录
code_dir: downloads/code             # 代码存放目录
i18n_dir: :lang                      # 国际化（多语言）目录
skip_render:                         # 跳过渲染的文件或目录（支持通配符）

# 写作设置
new_post_name: :title.md             # 新文章的默认文件名格式
default_layout: post                 # 默认布局（如 post, page, draft）
titlecase: false                     # 是否将标题转换为标题格式（首字母大写等）
external_link:
  enable: true                       # 是否在新标签页中打开外部链接
  field: site                        # 应用于整个网站
  exclude: ''                        # 排除的域名（多个用逗号分隔）
filename_case: 0                     # 文件名大小写：0-不变, 1-小写, 2-大写
render_drafts: false                 # 是否渲染草稿（草稿存于 _drafts 目录）
post_asset_folder: false             # 是否启用文章资源文件夹（与文章同名的文件夹）
relative_link: false                 # 是否生成站内相对链接
future: true                         # 是否显示未来日期的文章
syntax_highlighter: highlight.js     # 代码高亮库（可选 highlight.js 或 prismjs）
highlight:                           # highlight.js 配置
  line_number: true                  # 是否显示行号
  auto_detect: false                 # 是否自动检测语言
  tab_replace: ''                    # Tab字符替换为空格数（如 '  '）
  wrap: true                         # 是否换行
  hljs: false                        # 是否启用hljs类（用于CSS兼容）
prismjs:                             # PrismJS 配置
  preprocess: true                   # 是否预处理代码
  line_number: true                  # 是否显示行号
  tab_replace: ''                    # Tab替换字符

# 首页设置
index_generator:
  path: ''                           # 首页路径（默认为空）
  per_page: 10                       # 每页显示文章数量（0 表示禁用分页）
  order_by: -date                    # 文章排序方式（-date 表示按日期倒序）

# 分类与标签
default_category: uncategorized      # 默认分类
category_map:                        # 分类别名映射（用于URL优化）
tag_map:                             # 标签映射

# 元数据元素
meta_generator: true                 # 是否在HTML中添加生成器元标签（如 Hexo 6.0.0）

# 日期/时间格式
## Hexo 使用 Moment.js 来解析和显示日期
## 可参考：http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD              # 日期显示格式
time_format: HH:mm:ss                # 时间显示格式
## updated_option 支持 'mtime'(修改时间), 'date'(发布时间), 'empty'(空)
updated_option: 'mtime'

# 分页设置
per_page: 10                         # 每页文章数量（0 表示禁用分页）
pagination_dir: page                 # 分页目录前缀（如 /page/2/）

# 包含/排除文件
## include/exclude 仅对 'source/' 目录下的文件生效
include:                             # 指定额外包含的文件
exclude:                             # 指定排除的文件
ignore:                              # 忽略的文件或目录（不处理）

# 扩展设置
## 插件列表: https://hexo.io/plugins/
## 主题列表: https://hexo.io/themes/
theme: redefine                      # 使用的主题名称

